<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#08111f" />
    <meta name="description" content="Sree Harshitha Enterprises — Trusted Partner for Premium Electronics & Home Appliances in Chennai" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('sh-theme');
          var dark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (dark) {
            document.documentElement.classList.add('dark');
            document.querySelector('meta[name="theme-color"]').setAttribute('content', '#020617');
          } else {
            document.querySelector('meta[name="theme-color"]').setAttribute('content', '#ffffff');
          }
        } catch (_) {}
      })();
    </script>
    <title>Sree Harshitha Enterprises | Premium Electronics</title>
  </head>
  <body class="antialiased bg-slate-950 text-slate-100">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
